
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกบิลลอตเตอรี่</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: {
                        lottery: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; padding-bottom: 2rem; transition: background-color 0.3s; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        #app-wrapper { transform-origin: top center; transition: transform 0.2s ease; }
        
        /* ---------------- PREVIEW MODE STYLES ---------------- */
        body.preview-active {
            background-color: #ffffff;
            padding: 0;
            margin: 0;
        }
        
        .preview-active #top-nav,
        .preview-active #tabs-container,
        .preview-active .no-export { 
            display: none !important; 
        }

        .preview-active #app-wrapper {
            padding: 1rem;
            transform: scale(1) !important; /* Reset zoom */
            max-width: 800px;
            margin: 0 auto;
        }

        .preview-active #export-area {
            border: none;
            box-shadow: none;
            margin-top: 0;
            padding: 0;
        }

        .preview-active input {
            border: none !important;
            background: transparent !important;
            padding: 0 !important;
            box-shadow: none !important;
            color: #000 !important;
            font-weight: 600;
        }
        
        /* Center text in inputs during preview */
        .preview-active input[type=number],
        .preview-active input.text-center {
            text-align: center;
        }

        .preview-active .group-header-input {
            font-size: 1.125rem !important;
            font-weight: 700 !important;
            color: #16a34a !important;
            border-bottom: 2px solid #22c55e !important;
            padding-bottom: 4px !important;
        }

        .bill-header { display: none; }
        .preview-active .bill-header {
            display: block !important;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #e5e7eb;
        }
        
        .preview-active .group-item {
            border-bottom: 1px dashed #f3f4f6;
            background-color: #ffffff !important;
        }

        /* Float close button for preview mode */
        #close-preview-btn {
            display: none;
        }
        .preview-active #close-preview-btn {
            display: flex;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            animation: bounceInUp 0.5s;
        }

        @keyframes bounceInUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        /* ---------------------------------------------------- */

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        .input-clean {
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            padding: 0.25rem 0.5rem;
            outline: none;
            transition: all 0.2s;
            background-color: #fff;
        }
        .input-clean:focus { border-color: #22c55e; box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.1); }
        .row-container { display: flex; align-items: center; flex-wrap: nowrap; min-width: max-content; }
    </style>
</head>
<body class="text-gray-800 min-h-screen" id="main-body">

    <!-- Top Navigation -->
    <div id="top-nav" class="sticky top-0 z-40 bg-white border-b border-gray-200 shadow-sm px-4 py-3 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-ticket text-lottery-600 text-2xl"></i>
            <h1 class="font-semibold text-lg md:text-xl text-gray-900">ระบบบิลลอตเตอรี่</h1>
        </div>
        <div class="flex items-center gap-3 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-200 hidden md:flex">
            <i class="ph ph-magnifying-glass-minus text-gray-400"></i>
            <input type="range" id="zoom-slider" min="0.7" max="1.5" step="0.1" value="1" oninput="applyZoom(this.value)" class="w-24 md:w-32 accent-lottery-600 cursor-pointer">
            <i class="ph ph-magnifying-glass-plus text-gray-400"></i>
            <span id="zoom-display" class="text-xs font-medium text-gray-500 w-8 text-right">100%</span>
        </div>
    </div>

    <!-- Main Content -->
    <div id="app-wrapper" class="p-2 md:p-8 origin-top">
        <div class="max-w-5xl mx-auto space-y-4 md:space-y-6">
            
            <!-- Tabs -->
            <div class="bg-white rounded-t-2xl shadow-sm border border-gray-200 border-b-0 overflow-hidden pt-2 px-2 flex items-end gap-1 overflow-x-auto no-scrollbar" id="tabs-container"></div>
            
            <div class="bg-white rounded-b-2xl rounded-tr-2xl shadow-sm border border-gray-200 -mt-4 md:-mt-6 p-4 md:p-6 relative z-10" id="export-area">
                
                <!-- Bill Header (Visible only in Preview) -->
                <div class="bill-header">
                    <h2 class="text-2xl font-bold text-gray-800 uppercase tracking-widest">ใบเสร็จรับเงิน</h2>
                    <p class="text-sm text-gray-500 mt-1" id="invoice-date"></p>
                </div>

                <!-- Customer Name & Action Buttons -->
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4 pb-4 md:mb-6 md:pb-6 border-b border-gray-100">
                    <div class="w-full md:w-1/2">
                        <label class="text-xs font-semibold text-lottery-600 uppercase tracking-wider mb-1 block">ชื่อลูกค้า / Customer Name</label>
                        <input type="text" id="active-customer-name" placeholder="ระบุชื่อลูกค้า..." oninput="updateCustomerName(this.value)" class="w-full text-lg md:text-xl font-semibold border-b-2 border-transparent focus:border-lottery-500 outline-none transition-colors px-0 py-1 bg-transparent">
                    </div>
                    
                    <div class="no-export flex flex-wrap gap-2 w-full md:w-auto">
                        <button onclick="exportCSV()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-gray-50 text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-lg font-medium transition-colors text-sm border border-gray-200">
                            <i class="ph ph-file-csv text-lg"></i> โหลด CSV
                        </button>
                        <button onclick="togglePreviewMode()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-lottery-600 text-white hover:bg-lottery-700 px-5 py-2 rounded-lg font-medium transition-colors text-sm shadow-sm">
                            <i class="ph ph-eye text-lg"></i> พรีวิวบิล
                        </button>
                    </div>
                </div>

                <!-- Table Headers -->
                <div class="overflow-x-auto pb-2">
                    <div class="row-container gap-2 px-2 py-2 bg-gray-50 rounded-lg text-xs font-medium text-gray-500 mb-2">
                        <div class="w-6 md:w-8 text-center">ลำดับ</div>
                        <div class="w-24 md:w-32 text-center">เลข</div>
                        <div class="w-3 md:w-4"></div>
                        <div class="w-14 md:w-16 text-center">จำนวน</div>
                        <div class="w-3 md:w-4"></div>
                        <div class="w-16 md:w-20 text-center">ราคา</div>
                        <div class="w-3 md:w-4"></div>
                        <div class="w-3 md:w-4"></div>
                        <div class="w-20 md:w-24 text-center">รวม</div>
                        <div class="w-8 no-export"></div>
                    </div>
                    
                    <!-- Groups & Items -->
                    <div id="groups-container" class="space-y-6"></div>
                </div>

                <!-- Add Group & Grand Total -->
                <div class="mt-6 pt-4 border-t border-gray-100 flex flex-col items-center gap-4">
                    <button onclick="addGroup()" class="no-export w-full md:w-auto flex items-center justify-center gap-2 bg-blue-50 text-blue-600 hover:bg-blue-100 px-5 py-2.5 rounded-xl font-medium transition-colors text-sm border border-blue-200 border-dashed">
                        <i class="ph ph-folder-plus text-lg"></i> เพิ่มกลุ่มประเภท
                    </button>
                    
                    <div class="flex items-center gap-4 bg-lottery-50 px-6 py-4 rounded-xl border border-lottery-200 w-full justify-between md:justify-end">
                        <span class="text-gray-700 font-medium text-lg md:text-xl">ยอดรวมสุทธิ:</span>
                        <div class="text-right flex items-baseline gap-2">
                            <span class="text-3xl font-bold text-lottery-700" id="grand-total">0</span>
                            <span class="text-base text-gray-500 font-normal">บาท</span>
                        </div>
                    </div>
                </div>
                
                <!-- Bill Footer (Visible only in Preview) -->
                <div class="bill-header mt-8 !border-none !pb-0 hidden">
                    <p class="text-sm text-gray-500">ขอบคุณที่อุดหนุน ขอให้โชคดีครับ/ค่ะ</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Float Close Button for Preview Mode -->
    <button id="close-preview-btn" onclick="togglePreviewMode()" class="items-center gap-2 bg-red-600 text-white px-6 py-3 rounded-full font-semibold hover:bg-red-700 active:scale-95 transition-all">
        <i class="ph ph-x-circle text-xl"></i> ปิดพรีวิว (กลับไปแก้ไข)
    </button>

    <!-- Toast Notification -->
    <div id="toast-container" class="fixed bottom-5 right-5 flex flex-col gap-2 z-50"></div>

    <script>
        const CACHE_KEY = 'lottery_preview_data';
        let appData = { activeTabId: null, customers: [] };
        let currentZoom = 1;
        let isPreviewMode = false;

        function init() {
            loadFromCache();
            const today = new Date();
            document.getElementById('invoice-date').innerText = 'วันที่: ' + today.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

            if (appData.customers.length === 0) {
                addCustomerTab('ลูกค้า 1');
            } else {
                if (!appData.customers.find(c => c.id === appData.activeTabId)) appData.activeTabId = appData.customers[0].id;
            }
            renderApp();
        }

        // --- Cache Management ---
        function loadFromCache() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) { appData = JSON.parse(cached); }
            } catch (e) { console.error('Cache load error', e); }
        }

        function saveAllToCache() {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify(appData));
            } catch (e) { console.error('Cache save error.', e); }
        }

        function generateId() { return 'id_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

        function createEmptyItem() { return { id: generateId(), number: '', qty: 1, price: '', total: 0 }; }
        function createEmptyGroup(groupName = 'ประเภทใหม่') { return { id: generateId(), name: groupName, items: [createEmptyItem()] }; }

        // --- Tab Management ---
        function addCustomerTab(defaultName = '') {
            appData.customers.push({ id: generateId(), name: defaultName || `ลูกค้า ${appData.customers.length + 1}`, groups: [createEmptyGroup('ใบเดี่ยว')] });
            appData.activeTabId = appData.customers[appData.customers.length - 1].id;
            saveAllToCache(); renderApp();
        }

        function removeCustomerTab(id, event) {
            event.stopPropagation();
            if (appData.customers.length <= 1) return showToast('ต้องมีอย่างน้อย 1 คน', 'error');
            if (confirm('ลบข้อมูลลูกค้านี้?')) {
                appData.customers = appData.customers.filter(c => c.id !== id);
                if (appData.activeTabId === id) appData.activeTabId = appData.customers[appData.customers.length - 1].id;
                saveAllToCache(); renderApp();
            }
        }

        function switchTab(id) { appData.activeTabId = id; saveAllToCache(); renderApp(); }
        function getActiveCustomer() { return appData.customers.find(c => c.id === appData.activeTabId); }

        function updateCustomerName(val) {
            const customer = getActiveCustomer();
            if (customer) {
                customer.name = val;
                const tabSpan = document.getElementById(`tab-name-${customer.id}`);
                if (tabSpan) tabSpan.innerText = val || '(ไม่มีชื่อ)';
                saveAllToCache();
            }
        }

        // --- Group & Item Management ---
        function addGroup() {
            const customer = getActiveCustomer();
            if (customer) {
                if(!customer.groups) customer.groups = [];
                customer.groups.push(createEmptyGroup('ชุด '));
                saveAllToCache(); renderGroups();
                setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 100);
            }
        }

        function removeGroup(groupId) {
            const customer = getActiveCustomer();
            if (customer && customer.groups && confirm('ลบกลุ่มประเภทนี้และรายการทั้งหมดภายในกลุ่ม?')) {
                customer.groups = customer.groups.filter(g => g.id !== groupId);
                saveAllToCache(); renderGroups();
            }
        }

        function updateGroupName(groupId, val) {
            const customer = getActiveCustomer();
            if (customer && customer.groups) {
                const group = customer.groups.find(g => g.id === groupId);
                if (group) { group.name = val; saveAllToCache(); }
            }
        }

        function addItem(groupId) {
            const customer = getActiveCustomer();
            if (customer && customer.groups) {
                const group = customer.groups.find(g => g.id === groupId);
                if (group) { group.items.push(createEmptyItem()); saveAllToCache(); renderGroups(); }
            }
        }

        function removeItem(groupId, itemId) {
            const customer = getActiveCustomer();
            if (customer && customer.groups) {
                const group = customer.groups.find(g => g.id === groupId);
                if (group) { group.items = group.items.filter(i => i.id !== itemId); saveAllToCache(); renderGroups(); }
            }
        }

        function updateItem(groupId, itemId, field, value) {
            const customer = getActiveCustomer();
            if (!customer || !customer.groups) return;
            const group = customer.groups.find(g => g.id === groupId);
            if (!group) return;
            const item = group.items.find(i => i.id === itemId);
            if (item) {
                if (field === 'qty' || field === 'price') {
                    let numValue = field === 'qty' ? parseInt(value) : parseFloat(value);
                    item[field] = isNaN(numValue) || numValue < 0 ? (value === '' ? '' : (field === 'qty' ? 1 : 0)) : numValue;
                } else {
                    item[field] = value;
                }
                const p = parseFloat(item.price) || 0;
                const q = parseInt(item.qty) || 0;
                item.total = p * q;
                const totalEl = document.getElementById(`total-${item.id}`);
                if(totalEl) totalEl.innerText = formatNumber(item.total);
                updateGroupTotal(groupId); updateGrandTotal(); saveAllToCache();
            }
        }

        // --- Rendering ---
        function renderApp() {
            renderTabs();
            const activeCus = getActiveCustomer();
            if (activeCus) {
                document.getElementById('active-customer-name').value = activeCus.name;
                renderGroups();
            }
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            let html = '';
            appData.customers.forEach(c => {
                const isActive = c.id === appData.activeTabId;
                const activeClasses = isActive ? "bg-white text-lottery-700 shadow-[0_-2px_4px_rgba(0,0,0,0.02)]" : "bg-gray-100 text-gray-500 hover:bg-gray-50";
                html += `
                    <div class="group flex items-center gap-2 px-3 md:px-4 py-2.5 rounded-t-xl text-sm font-medium transition-all cursor-pointer border-t border-x relative top-[1px] ${activeClasses} z-${isActive?10:0}" onclick="switchTab('${c.id}')">
                        <span class="max-w-[80px] md:max-w-[120px] truncate" id="tab-name-${c.id}">${c.name || '(ไม่มีชื่อ)'}</span>
                        <button onclick="removeCustomerTab('${c.id}', event)" class="opacity-50 hover:text-red-500 p-0.5 ${appData.customers.length <= 1 ? 'hidden' : ''}">
                            <i class="ph ph-x text-xs"></i>
                        </button>
                    </div>`;
            });
            html += `<button onclick="addCustomerTab()" class="px-2 md:px-3 py-2.5 text-gray-400 hover:text-lottery-600 ml-1"><i class="ph ph-plus font-bold text-lg"></i></button>`;
            container.innerHTML = html;
        }

        function renderGroups() {
            const container = document.getElementById('groups-container');
            const customer = getActiveCustomer();
            if (!customer) return;
            let html = '';
            if(!customer.groups) customer.groups = [];

            customer.groups.forEach((group, groupIndex) => {
                let itemsHtml = '';
                group.items.forEach((item, itemIndex) => {
                    itemsHtml += `
                    <div class="row-container gap-1 md:gap-2 p-1.5 md:p-2 bg-white hover:bg-gray-50 transition-colors group-item">
                        <div class="w-6 md:w-8 text-center text-xs md:text-sm font-bold text-gray-400 no-export">${itemIndex + 1}:</div>
                        <div class="w-6 md:w-8 text-center text-xs md:text-sm font-bold text-gray-800 hidden export-only export-show">${itemIndex + 1}.</div>
                        
                        <input type="text" value="${item.number}" oninput="updateItem('${group.id}', '${item.id}', 'number', this.value)"
                            placeholder="เลข" class="input-clean w-24 md:w-32 text-center font-semibold text-base md:text-lg text-gray-800 tracking-wider">
                        <div class="w-3 md:w-4 text-center text-gray-400 font-bold text-xs md:text-base">*</div>
                        
                        <input type="number" value="${item.qty}" min="1" oninput="updateItem('${group.id}', '${item.id}', 'qty', this.value)"
                            placeholder="จน." class="input-clean w-14 md:w-16 text-center font-medium text-sm md:text-base">
                        <div class="w-3 md:w-4 text-center text-gray-400 font-bold text-xs md:text-base">(</div>
                        
                        <input type="number" value="${item.price}" min="0" oninput="updateItem('${group.id}', '${item.id}', 'price', this.value)"
                            placeholder="ราคา" class="input-clean w-16 md:w-20 text-center font-medium text-sm md:text-base bg-green-50/50">
                        <div class="w-3 md:w-4 text-center text-gray-400 font-bold text-xs md:text-base">)</div>
                        <div class="w-3 md:w-4 text-center text-gray-400 font-bold text-xs md:text-base">=</div>
                        
                        <div class="w-20 md:w-24 text-center font-bold text-base md:text-lg text-gray-900" id="total-${item.id}">${formatNumber(item.total)}</div>
                        
                        <button onclick="removeItem('${group.id}', '${item.id}')" class="no-export w-6 md:w-8 text-center text-gray-300 hover:text-red-500 ml-auto">
                            <i class="ph ph-x-circle text-lg md:text-xl"></i>
                        </button>
                    </div>`;
                });

                html += `
                <div class="bg-white border border-gray-200 rounded-xl overflow-hidden mb-4 shadow-sm relative group-wrapper">
                    <button onclick="removeGroup('${group.id}')" class="no-export absolute right-3 top-3 text-gray-300 hover:text-red-500 transition-colors z-10"><i class="ph ph-trash text-lg"></i></button>
                    <div class="bg-lottery-50/50 px-4 py-3 border-b border-gray-100 flex items-center pr-10">
                        <input type="text" value="${group.name}" oninput="updateGroupName('${group.id}', this.value)"
                            placeholder="พิมพ์ชื่อประเภท" class="input-clean group-header-input w-full md:w-1/2 bg-transparent border-b border-gray-300 rounded-none px-0 py-1 text-lottery-700 font-semibold focus:border-lottery-600" style="box-shadow:none;">
                    </div>
                    <div class="p-2">${itemsHtml}</div>
                    <div class="bg-gray-50/50 px-4 py-2 border-t border-gray-100 flex justify-between items-center no-export">
                        <button onclick="addItem('${group.id}')" class="flex items-center gap-1 text-sm text-lottery-600 hover:text-lottery-800 font-medium"><i class="ph ph-plus-circle"></i> เพิ่มแถว</button>
                        <div class="text-sm text-gray-600">รวมกลุ่ม: <span class="font-bold text-gray-900 ml-2" id="group-total-${group.id}">0</span></div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            updateAllTotals();
            
            // Re-apply preview styling if we rendered while in preview mode
            if(isPreviewMode) applyPreviewStylesToInputs();
        }

        // --- Totals ---
        function updateGroupTotal(groupId) {
            const customer = getActiveCustomer();
            if (customer && customer.groups) {
                const group = customer.groups.find(g => g.id === groupId);
                if (group) {
                    const groupTotal = group.items.reduce((sum, item) => sum + (parseFloat(item.total) || 0), 0);
                    const el = document.getElementById(`group-total-${groupId}`);
                    if (el) el.innerText = formatNumber(groupTotal);
                }
            }
        }
        function updateAllTotals() {
            const customer = getActiveCustomer();
            if (customer && customer.groups) {
                customer.groups.forEach(g => updateGroupTotal(g.id));
                updateGrandTotal();
            }
        }
        function updateGrandTotal() {
            const customer = getActiveCustomer();
            if (customer && customer.groups) {
                let grandTotal = 0;
                customer.groups.forEach(group => { grandTotal += group.items.reduce((sum, item) => sum + (parseFloat(item.total) || 0), 0); });
                document.getElementById('grand-total').innerText = formatNumber(grandTotal);
            }
        }
        function formatNumber(num) { return Number(num).toLocaleString('th-TH'); }

        // --- Zooming ---
        function applyZoom(val) {
            if(isPreviewMode) return; // Disable zoom slider while in preview
            currentZoom = parseFloat(val);
            document.getElementById('app-wrapper').style.transform = `scale(${currentZoom})`;
            const display = document.getElementById('zoom-display');
            if(display) display.innerText = Math.round(currentZoom * 100) + '%';
        }

        // --- PREVIEW MODE (Replaces Export to Image) ---
        function togglePreviewMode() {
            isPreviewMode = !isPreviewMode;
            const body = document.getElementById('main-body');
            
            if (isPreviewMode) {
                // Enter Preview Mode
                body.classList.add('preview-active');
                applyPreviewStylesToInputs();
                
                // Show hidden export-only elements (like dots after numbers)
                document.querySelectorAll('.export-show').forEach(el => {
                    el.classList.remove('hidden');
                    el.style.display = 'block';
                });
                
                // Remove visual borders from groups in preview
                document.querySelectorAll('.group-wrapper').forEach(el => {
                    el.style.border = 'none';
                    el.style.boxShadow = 'none';
                });

                showToast('เข้าสู่โหมดพรีวิว สามารถแคปหน้าจอได้เลย', 'info');
                window.scrollTo(0, 0); // Scroll to top for clean screenshot
            } else {
                // Exit Preview Mode
                body.classList.remove('preview-active');
                
                // Hide export-only elements
                document.querySelectorAll('.export-show').forEach(el => {
                    el.style.display = '';
                    el.classList.add('hidden');
                });
                
                // Restore group borders
                document.querySelectorAll('.group-wrapper').forEach(el => {
                    el.style.border = '';
                    el.style.boxShadow = '';
                });

                // Restore zoom
                const slider = document.getElementById('zoom-slider');
                if(slider) applyZoom(slider.value);
            }
        }

        function applyPreviewStylesToInputs() {
            if(!isPreviewMode) return;
            const inputs = document.querySelectorAll('#export-area input');
            inputs.forEach(input => {
                // Remove background from custom price input
                if(input.classList.contains('bg-green-50/50')) {
                    input.style.backgroundColor = 'transparent';
                }
            });
        }

        // --- CSV Export ---
        function exportCSV() {
            const customer = getActiveCustomer();
            if (!customer) return;

            let csvContent = "\uFEFF"; 
            csvContent += `ชื่อลูกค้า:, "${customer.name ? customer.name.replace(/"/g, '""') : 'ไม่ระบุ'}"\n\n`;
            
            customer.groups.forEach(group => {
                csvContent += `--- ${group.name} ---\n`;
                csvContent += "ลำดับ,เลขลอตเตอรี่,จำนวน,ราคา,ราคารวม\n";
                group.items.forEach((item, idx) => {
                    csvContent += `${idx+1},"${item.number||''}",${item.qty||0},${item.price||0},${item.total||0}\n`;
                });
                csvContent += "\n";
            });

            const date = new Date().toISOString().split('T')[0];
            const safeCustName = customer.name ? customer.name.substring(0, 15).replace(/[^a-zA-Z0-9ก-๙]/g, '_') : 'Customer';
            const fileName = `Lottery_${safeCustName}_${date}.csv`;
            
            try {
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", fileName);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('ดาวน์โหลด CSV สำเร็จ', 'success');
            } catch(e) {
                showToast('ไม่สามารถโหลด CSV ได้', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColors = { success: 'bg-green-600', error: 'bg-red-500', info: 'bg-blue-500' };
            toast.className = `flex items-center gap-3 ${bgColors[type]} text-white px-4 py-3 rounded-lg shadow-xl mb-2 transition-all duration-300 z-[9999]`;
            toast.innerHTML = `<span class="font-medium text-sm">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => container.removeChild(toast), 300);
            }, 2500);
        }

        window.onload = init;
    </script>
</body>
</html>
